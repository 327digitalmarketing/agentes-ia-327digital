<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Widget</title>
  <link rel="stylesheet" href="/chat-styles.css">
</head>
<body>
  <div id="chat-container">
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <input
        type="text"
        id="input"
        placeholder="Escribe tu pregunta..."
        autocomplete="off"
      />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const clientId = urlParams.get('clientId');
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    let userId = localStorage.getItem('chat-user-id');
    if (!userId) {
      userId = 'user-' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('chat-user-id', userId);
    }

    // Mensaje inicial
    addMessage('assistant', '¡Hola! 👋 Soy tu asistente IA. ¿En qué puedo ayudarte?');

    function addMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.innerHTML = content;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage('user', message);
      input.value = '';
      sendBtn.disabled = true;

      try {
        const response = await fetch('https://agentesia327digital.vercel.app/api/agent/message', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            clientId: clientId,
            userId: userId,
            message: message
          })
        });

        const data = await response.json();
        if (data.success) {
          addMessage('assistant', data.reply);
        } else {
          addMessage('assistant', 'Disculpa, algo salió mal. Intenta de nuevo.');
        }
      } catch (error) {
        addMessage('assistant', 'Error de conexión. Verifica tu internet.');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    sendBtn.addEventListener('click', sendMessage);
  </script>
</body>
</html>
